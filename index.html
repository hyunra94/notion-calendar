<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notion Calendar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF0F3;--card:#FFFFFF;--card-border:#F8BBD0;
    --surface:#FFF5F7;--hover:#FCE4EC;
    --text:#4A2040;--text-dim:#AD7A99;--text-muted:#D4A0BD;
    --accent:#E91E63;--accent-light:#FCE4EC;--accent-glow:rgba(233,30,99,0.12);
    --grid-line:rgba(233,30,99,0.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;overflow-x:hidden}
  body{font-family:'Gowun Dodum','DotGothic16',sans-serif;background:var(--bg);color:var(--text);padding:3px}
  .app{width:100%}
 
  .header{display:flex;align-items:center;justify-content:space-between;padding:3px 2px;margin-bottom:4px}
  .header-left{display:flex;align-items:center;gap:4px;min-width:0}
  .logo{width:24px;height:24px;border:2px solid #F06292;background:#FCE4EC;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;box-shadow:2px 2px 0 #F48FB1}
  .header-title{font-size:13px;font-weight:800;font-family:'DotGothic16',monospace;color:var(--accent);white-space:nowrap}
  .header-sub{font-size:7px;color:var(--text-dim);font-family:'DotGothic16',monospace}
  .header-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
  .view-toggle{display:flex;background:#FCE4EC;padding:1px;border:2px solid #F48FB1;box-shadow:1px 1px 0 #F48FB1}
  .view-btn{border:none;padding:2px 6px;font-size:9px;font-weight:700;cursor:pointer;font-family:'DotGothic16',monospace;background:transparent;color:var(--text-dim)}
  .view-btn.active{background:#F06292;color:#fff;box-shadow:inset 1px 1px 0 #E91E63}
  .nav-btn{width:20px;height:20px;border:2px solid #F48FB1;background:#FCE4EC;cursor:pointer;font-size:11px;color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'DotGothic16',monospace;box-shadow:1px 1px 0 #F48FB1}
  .nav-btn:active{box-shadow:none;transform:translate(1px,1px)}
  .today-btn{height:20px;padding:0 4px;border:2px solid #F48FB1;background:#FCE4EC;cursor:pointer;font-size:7px;font-weight:700;color:var(--accent);font-family:'DotGothic16',monospace;box-shadow:1px 1px 0 #F48FB1}
  .today-btn:active{box-shadow:none;transform:translate(1px,1px)}
 
  .filters{display:flex;gap:2px;margin-bottom:4px;padding:0 2px}
  .filter-btn{padding:2px 6px;font-size:9px;font-weight:700;cursor:pointer;font-family:'DotGothic16',monospace;background:#FCE4EC;border:2px solid #F8BBD0;color:var(--text-dim);box-shadow:1px 1px 0 #F8BBD0}
  .filter-btn:active{box-shadow:none;transform:translate(1px,1px)}
  .filter-btn.active-all{border-color:#E91E63;background:#F06292;color:#fff;box-shadow:1px 1px 0 #C2185B}
 
  .cal-card{background:var(--card);border:2px solid #F48FB1;overflow:hidden;width:100%;box-shadow:3px 3px 0 #F8BBD0}
 
  .month-table{width:100%;border-collapse:collapse;table-layout:fixed}
  .month-table th{padding:4px 0;text-align:center;font-size:9px;font-weight:700;font-family:'DotGothic16',monospace;color:var(--text-dim);border-bottom:2px solid #F8BBD0;background:#FFF5F7}
  .month-table th.sun{color:#E53935}.month-table th.sat{color:#1976D2}
  .month-table td{padding:0;vertical-align:top;border-right:1px solid var(--grid-line);border-bottom:1px solid var(--grid-line);height:48px;cursor:pointer;overflow:hidden}
  .month-table td:last-child{border-right:none}
  .month-table td:hover{background:var(--hover)}
  .month-table td.other{opacity:.2}
  .month-table td.today-cell{background:#FCE4EC}
 
  .date-tap{display:block;padding:3px 1px 2px;text-align:center;min-height:16px}
  .date-num{font-size:10px;font-weight:700;color:var(--text);font-family:'DotGothic16',monospace;display:inline-block}
  .date-num.today{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:#F06292;color:#fff;font-weight:800;border:2px solid #C2185B;box-shadow:1px 1px 0 #E91E63;animation:blink 1.5s step-end infinite}
  .date-num.sun{color:#E53935}.date-num.sat{color:#1976D2}
  .ev-area{padding:0 1px 1px}
 
  .ev-pill{padding:1px 2px;margin-bottom:1px;font-size:8px;font-weight:600;border-left:2px solid;cursor:pointer;display:block;text-decoration:none;line-height:1.3;word-break:break-all;white-space:normal;font-family:'Gowun Dodum',sans-serif}
  .ev-more{font-size:7px;color:var(--text-dim);font-weight:600;text-align:center;font-family:'DotGothic16',monospace;padding:1px;cursor:pointer}
  .ev-more:hover{color:var(--accent)}
 
  .ev-bar{padding:1px 2px;margin-bottom:1px;font-size:8px;font-weight:700;cursor:pointer;display:block;text-decoration:none;line-height:1.3;word-break:break-all;white-space:normal;font-family:'Gowun Dodum',sans-serif;min-height:14px}
  .ev-bar.bar-start{border-left:3px solid;margin-right:-1px;padding-right:0}
  .ev-bar.bar-mid{border-left:none;margin-left:-1px;margin-right:-1px;padding-left:2px;padding-right:0}
  .ev-bar.bar-end{border-left:none;border-right:3px solid;margin-left:-1px;padding-left:2px}
  .ev-bar.bar-single{border-left:3px solid}
 
  .week-table{width:100%;border-collapse:collapse;table-layout:fixed}
  .week-table th{padding:4px 0;text-align:center;font-size:9px;font-weight:700;font-family:'DotGothic16',monospace;color:var(--text-dim);border-bottom:2px solid #F8BBD0;background:#FFF5F7}
  .week-table th.sun{color:#E53935}.week-table th.sat{color:#1976D2}
  .week-table td{padding:1px;vertical-align:top;border-right:1px solid var(--grid-line);cursor:pointer;overflow:hidden;min-height:60px}
  .week-table td:last-child{border-right:none}
  .week-table td:hover{background:var(--hover)}
  .week-table td.today-cell{background:#FCE4EC}
  .week-date-header{text-align:center;padding:3px 0;margin-bottom:2px;border-bottom:1px dashed var(--grid-line)}
  .week-date-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;font-weight:800;font-size:11px;font-family:'DotGothic16',monospace;color:var(--text)}
  .week-date-num.today{background:#F06292;color:#fff;border:2px solid #C2185B;box-shadow:1px 1px 0 #E91E63}
  .week-events{max-height:280px;overflow-y:auto}
  .week-ev-pill{padding:1px 2px;margin-bottom:1px;font-size:8px;font-weight:600;border-left:2px solid;cursor:pointer;display:block;text-decoration:none;line-height:1.3;word-break:break-all;white-space:normal;font-family:'Gowun Dodum',sans-serif}
 
  .detail-panel{margin-top:4px;background:var(--card);padding:8px;border:2px solid #F48FB1;box-shadow:2px 2px 0 #F8BBD0;animation:fadeIn .2s ease}
  .detail-title{font-size:11px;font-weight:800;font-family:'DotGothic16',monospace;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;color:var(--accent)}
  .detail-title-left{display:flex;align-items:center;gap:4px}
  .detail-count{background:#F06292;color:#fff;padding:0 5px;font-size:8px;border:1px solid #C2185B}
  .detail-item{display:flex;align-items:center;gap:5px;padding:5px 6px;margin-bottom:3px;cursor:pointer;text-decoration:none;color:inherit;border:1px solid var(--grid-line);background:var(--surface)}
  .detail-item:hover{background:var(--hover)}
  .detail-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;border:1px solid #F8BBD0;background:#FCE4EC}
  .detail-info{flex:1;min-width:0}
  .detail-name{font-weight:700;font-size:10px}
  .detail-meta{font-size:8px;color:var(--text-dim);margin-top:1px;font-family:'DotGothic16',monospace}
  .detail-arrow{color:var(--text-muted);font-size:10px;flex-shrink:0;font-family:'DotGothic16',monospace}
 
  .add-btn{border:2px solid #F06292;background:#FCE4EC;color:#E91E63;font-size:10px;font-weight:800;font-family:'DotGothic16',monospace;padding:2px 6px;cursor:pointer;box-shadow:1px 1px 0 #F48FB1}
  .add-btn:active{box-shadow:none;transform:translate(1px,1px)}
 
  .add-form{margin-top:4px;padding:8px;background:var(--surface);border:2px solid #F48FB1;animation:fadeIn .2s ease}
  .add-form-title{font-size:10px;font-weight:800;font-family:'DotGothic16',monospace;color:var(--accent);margin-bottom:5px}
  .add-form label{display:block;font-size:8px;font-weight:700;color:var(--text-dim);margin-bottom:2px;font-family:'DotGothic16',monospace}
  .add-form input,.add-form select{width:100%;padding:5px 6px;border:2px solid #F8BBD0;background:var(--card);color:var(--text);font-size:10px;font-family:'Gowun Dodum',sans-serif;outline:none;margin-bottom:6px}
  .add-form input:focus,.add-form select:focus{border-color:#E91E63}
  .add-form-btns{display:flex;gap:4px;margin-top:2px}
  .add-submit{flex:1;padding:6px;border:2px solid #C2185B;background:#F06292;color:#fff;font-weight:800;font-size:10px;cursor:pointer;font-family:'DotGothic16',monospace;box-shadow:1px 1px 0 #E91E63}
  .add-submit:active{box-shadow:none;transform:translate(1px,1px)}
  .add-cancel{flex:1;padding:6px;border:2px solid #F8BBD0;background:#FCE4EC;color:var(--text-dim);font-weight:800;font-size:10px;cursor:pointer;font-family:'DotGothic16',monospace;box-shadow:1px 1px 0 #F8BBD0}
  .add-cancel:active{box-shadow:none;transform:translate(1px,1px)}
  .add-msg{font-size:9px;font-family:'DotGothic16',monospace;text-align:center;padding:4px;margin-top:4px}
 
  .setup-overlay{display:flex;align-items:center;justify-content:center;min-height:80vh}
  .setup-box{background:var(--card);border:3px solid #F48FB1;padding:16px 12px;width:100%;max-width:360px;box-shadow:4px 4px 0 #F8BBD0}
  .setup-logo{width:40px;height:40px;border:3px solid #F06292;background:#FCE4EC;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 8px;box-shadow:2px 2px 0 #F48FB1}
  .setup-title{text-align:center;font-size:16px;font-weight:800;font-family:'DotGothic16',monospace;color:var(--accent);margin-bottom:3px}
  .setup-desc{text-align:center;font-size:10px;color:var(--text-dim);margin-bottom:14px;line-height:1.5}
  .setup-label{font-size:9px;font-weight:700;color:var(--text-dim);margin-bottom:3px;font-family:'DotGothic16',monospace}
  .setup-input{width:100%;padding:7px 8px;border:2px solid #F8BBD0;background:var(--surface);color:var(--text);font-size:10px;font-family:inherit;outline:none;margin-bottom:8px}
  .setup-input:focus{border-color:#E91E63}
  .setup-btn{width:100%;padding:9px;border:2px solid #C2185B;background:#F06292;color:#fff;font-weight:800;font-size:11px;cursor:pointer;font-family:'DotGothic16',monospace;box-shadow:2px 2px 0 #E91E63}
  .setup-btn:active{box-shadow:none;transform:translate(2px,2px)}
  .setup-hint{margin-top:8px;padding:7px;background:var(--surface);border:2px solid #F8BBD0;font-size:8px;color:var(--text-dim);line-height:1.6}
  .setup-hint code{background:#FCE4EC;color:var(--accent);padding:0 3px;border:1px solid #F8BBD0;font-size:8px;font-family:'DotGothic16',monospace}
  .setup-step{display:flex;align-items:flex-start;gap:4px;margin-bottom:4px}
  .setup-step-num{width:14px;height:14px;flex-shrink:0;background:#F06292;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1px solid #C2185B;font-family:'DotGothic16',monospace}
 
  .loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 8px;color:var(--text-dim)}
  .spinner{width:20px;height:20px;border:3px solid #F8BBD0;border-top:3px solid #E91E63;animation:spin .8s steps(8) infinite;margin-bottom:6px}
  .error-msg{padding:8px;background:#FFEBEE;color:#C62828;border:2px solid #EF9A9A;font-size:10px;text-align:center;margin:8px 2px;font-family:'DotGothic16',monospace}
 
  @media(min-width:641px){
    body{padding:16px}.app{max-width:960px;margin:0 auto}
    .header{margin-bottom:10px;padding:0}.logo{width:32px;height:32px;font-size:16px}.header-title{font-size:18px}.header-sub{font-size:10px}
    .view-btn{padding:4px 10px;font-size:12px}.nav-btn{width:28px;height:28px;font-size:14px}.today-btn{height:28px;padding:0 8px;font-size:9px}
    .filters{gap:4px;margin-bottom:8px;padding:0}.filter-btn{padding:3px 10px;font-size:10px}
    .month-table th,.week-table th{font-size:12px;padding:6px 0}.month-table td{height:80px;padding:3px}.date-num{font-size:13px}
    .ev-pill,.week-ev-pill{font-size:10px;padding:1px 4px;border-left-width:3px}.ev-bar{font-size:10px;padding:1px 4px}.ev-more{font-size:9px}
    .detail-panel{padding:12px;margin-top:8px}.detail-name{font-size:12px}.detail-meta{font-size:9px}.detail-icon{width:28px;height:28px;font-size:13px}
    .week-date-num{width:28px;height:28px;font-size:14px}.week-events{max-height:400px}
    .add-form input,.add-form select{font-size:12px;padding:6px 8px}
  }
 
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.7}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CONFIG={
  WORKER_URL:'https://notion-proxy.abyss9405.workers.dev',
  DATABASE_ID:'1ff6b59b151a8173b350ea75f155aa8d',
  PROPS:{title:'제목',date:'날짜',category:'카테고리',duration:'소요시간',project:'프로젝트',personalMemo:'개인 메모',cancel:'취소'},
  PROJECT_IDS:{'개인':'2026b59b151a8062b13fe1bdf955e54c','일정':'28f6b59b151a8033a20cddb3581de335'},
  CATEGORIES:[
    {id:'업무',emoji:'💼',color:'rose'},
    {id:'약속',emoji:'🌸',color:'peach'},
    {id:'개인',emoji:'✏️',color:'steel'}
  ],
};
const COLORS={
  rose:{bg:'#F06292',light:'#FCE4EC',text:'#C2185B'},
  peach:{bg:'#FFAB91',light:'#FBE9E7',text:'#D84315'},
  coral:{bg:'#EF5350',light:'#FFEBEE',text:'#C62828'},
  steel:{bg:'#90A4AE',light:'#ECEFF1',text:'#455A64'},
};
const DAYS=['월','화','수','목','금','토','일'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
 
let state={view:'month',currentDate:new Date(),events:[],selectedDate:null,filterCat:null,loading:false,error:null,configured:!!(CONFIG.WORKER_URL&&CONFIG.DATABASE_ID),showAddForm:false,addMsg:'',showCancelled:false};
 
async function fetchEvents(start,end){
  state.loading=true;state.error=null;render();
  try{
    const res=await fetch(CONFIG.WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({database_id:CONFIG.DATABASE_ID,filter:{and:[{property:CONFIG.PROPS.date,date:{on_or_after:start}},{property:CONFIG.PROPS.date,date:{on_or_before:end}}]},sorts:[{property:CONFIG.PROPS.date,direction:'ascending'}],page_size:100})});
    if(!res.ok){throw new Error('API '+res.status);}
    const data=await res.json();
    if(data.object==='error')throw new Error(data.message||'Notion 오류');
    state.events=(data.results||[]).map(p=>{
      const pr=p.properties,dateObj=pr[CONFIG.PROPS.date]?.date;
      const startVal=dateObj?.start||'',endVal=dateObj?.end||'';
      const[d,t]=startVal.includes('T')?startVal.split('T'):[startVal,''];
      const endDate=endVal?endVal.split('T')[0]:'';
      return{id:p.id,url:p.url||`https://notion.so/${p.id.replace(/-/g,'')}`,title:pr[CONFIG.PROPS.title]?.title?.[0]?.plain_text||'(제목 없음)',date:d,endDate,time:t?t.slice(0,5):'',category:pr[CONFIG.PROPS.category]?.select?.name||'',duration:pr[CONFIG.PROPS.duration]?.number||30,isMultiDay:!!(endDate&&endDate!==d),cancelled:pr[CONFIG.PROPS.cancel]?.checkbox||false};
    });
    state.loading=false;render();
  }catch(e){state.loading=false;state.error=e.message;render();}
}
 
async function createEvent(title,date,type,endDate,people){
  state.addMsg='추가 중... 🌸';render();
  try{
    const props={};
    props[CONFIG.PROPS.title]={title:[{text:{content:title}}]};
    props[CONFIG.PROPS.date]={date:endDate?{start:date,end:endDate}:{start:date}};
 
    if(type==='약속'){
      props[CONFIG.PROPS.category]={select:{name:'개인'}};
      props[CONFIG.PROPS.project]={relation:[{id:CONFIG.PROJECT_IDS['개인']}]};
      if(people&&people.trim()){
        const names=people.split(',').map(n=>n.trim()).filter(n=>n);
        if(names.length)props[CONFIG.PROPS.personalMemo]={multi_select:names.map(n=>({name:n}))};
      }
    }else if(type==='개인'){
      props[CONFIG.PROPS.category]={select:{name:'할일'}};
      props[CONFIG.PROPS.project]={relation:[{id:CONFIG.PROJECT_IDS['개인']}]};
    }else{
      props[CONFIG.PROPS.category]={select:{name:'일정'}};
      props[CONFIG.PROPS.project]={relation:[{id:CONFIG.PROJECT_IDS['일정']}]};
    }
 
    const res=await fetch(CONFIG.WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({database_id:CONFIG.DATABASE_ID,properties:props})});
    const result=await res.json();
    if(!res.ok||result.object==='error')throw new Error(result.message||'추가 실패');
    state.addMsg='✅ 추가 완료!';state.showAddForm=false;render();
    setTimeout(()=>{state.addMsg='';fetchRange();},1200);
  }catch(e){state.addMsg='❌ '+e.message;render();}
}
 
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return fmt(new Date())}
function getMonthDays(y,m){const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();let fd=new Date(y,m,1).getDay();fd=fd===0?6:fd-1;const days=[];for(let i=fd-1;i>=0;i--)days.push({date:new Date(y,m-1,prev-i),cur:false});for(let i=1;i<=dim;i++)days.push({date:new Date(y,m,i),cur:true});while(days.length<42){const n=days.length-fd-dim+1;days.push({date:new Date(y,m+1,n),cur:false})}return days}
function getWeekDays(d){const s=new Date(d);let day=s.getDay();s.setDate(s.getDate()+(day===0?-6:1-day));return Array.from({length:7},(_,i)=>{const w=new Date(s);w.setDate(s.getDate()+i);return w})}
function getDowMon(d){const dow=d.getDay();return dow===0?6:dow-1;}
 
function eventsOn(ds){
  let evs=state.events.filter(e=>e.isMultiDay?(ds>=e.date&&ds<=e.endDate):e.date===ds);
  if(!state.showCancelled)evs=evs.filter(e=>!e.cancelled);
  if(state.filterCat){
    if(state.filterCat==='업무')evs=evs.filter(e=>e.category!=='개인'&&e.category!=='할일');
    else if(state.filterCat==='약속')evs=evs.filter(e=>e.category==='개인'||e.category==='공휴일');
    else if(state.filterCat==='개인')evs=evs.filter(e=>e.category==='할일'||e.category==='공휴일');
  }
  return evs;
}
 
function catInfo(n){return CONFIG.CATEGORIES.find(c=>c.id===n)||{emoji:'📌',color:'steel'}}
function catColor(n){
  // 노션 카테고리 → 캘린더 색상 매핑
  if(n==='공휴일')return COLORS['coral'];
  if(n==='개인')return COLORS['peach'];   // 노션의 '개인' = 캘린더의 '약속'
  if(n==='할일')return COLORS['steel'];   // 노션의 '할일' = 캘린더의 '개인'
  return COLORS['rose'];                  // 나머지 = 업무
}
 
function fetchRange(){const d=state.currentDate;if(state.view==='month'){const y=d.getFullYear(),m=d.getMonth();fetchEvents(fmt(new Date(y,m-1,20)),fmt(new Date(y,m+1,10)))}else{const wk=getWeekDays(d);fetchEvents(fmt(wk[0]),fmt(wk[6]))}}
 
function render(){
  const app=document.getElementById('app');
  if(!state.configured){app.innerHTML=renderSetup();bindSetup();return}
  app.innerHTML=renderHeader()+renderFilters()+renderCalendar()+renderDetail()+renderAddForm();
  bindEvents();
}
 
function renderSetup(){
  return`<div class="setup-overlay"><div class="setup-box">
    <div class="setup-logo">🌸</div><div class="setup-title">Notion Calendar</div>
    <div class="setup-desc">노션 DB와 연결하여 일정을 확인하세요</div>
    <div class="setup-label">🔗 Worker URL</div><input class="setup-input" id="inp-worker" value="${CONFIG.WORKER_URL}">
    <div class="setup-label">🗄️ Database ID</div><input class="setup-input" id="inp-dbid" value="${CONFIG.DATABASE_ID}">
    <button class="setup-btn" id="btn-connect">🌸 START!</button>
    <div class="setup-hint"><div style="font-weight:700;margin-bottom:3px;color:var(--text)">📋 GUIDE</div>
      <div class="setup-step"><div class="setup-step-num">1</div><div>노션 DB에 <code>제목</code> <code>날짜</code> <code>카테고리</code></div></div>
      <div class="setup-step"><div class="setup-step-num">2</div><div><a href="https://www.notion.so/my-integrations" target="_blank" style="color:var(--accent)">notion.so/my-integrations</a></div></div>
      <div class="setup-step"><div class="setup-step-num">3</div><div>Cloudflare Worker + <code>worker.js</code></div></div>
      <div class="setup-step"><div class="setup-step-num">4</div><div>입력 후 START!</div></div></div>
  </div></div>`}
function bindSetup(){const b=document.getElementById('btn-connect'),w=document.getElementById('inp-worker'),d=document.getElementById('inp-dbid');if(!b)return;b.addEventListener('click',()=>{CONFIG.WORKER_URL=w.value.trim();CONFIG.DATABASE_ID=d.value.trim();if(CONFIG.WORKER_URL&&CONFIG.DATABASE_ID){state.configured=true;render();fetchRange()}})}
 
function renderHeader(){
  const d=state.currentDate;let title;
  if(state.view==='month')title=`${d.getFullYear()}년 ${MONTHS[d.getMonth()]}`;
  else{const wk=getWeekDays(d),s=wk[0],e=wk[6];title=s.getMonth()===e.getMonth()?`${MONTHS[s.getMonth()]} ${s.getDate()}–${e.getDate()}일`:`${MONTHS[s.getMonth()]} ${s.getDate()}–${MONTHS[e.getMonth()]} ${e.getDate()}일`}
  const cm=state.events.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===d.getMonth()&&ed.getFullYear()===d.getFullYear()}).length;
  return`<div class="header"><div class="header-left"><div class="logo">🌸</div><div><div class="header-title">${title}</div><div class="header-sub">${cm}개 / ${state.events.length}개</div></div></div><div class="header-right"><div class="view-toggle"><button class="view-btn ${state.view==='month'?'active':''}" data-view="month">월</button><button class="view-btn ${state.view==='week'?'active':''}" data-view="week">주</button></div><button class="nav-btn" data-nav="-1">◀</button><button class="today-btn" data-nav="today">TODAY</button><button class="nav-btn" data-nav="1">▶</button></div></div>`}
 
function renderFilters(){
  let h=`<div class="filters"><button class="filter-btn ${!state.filterCat?'active-all':''}" data-cat="">ALL</button>`;
  for(const cat of CONFIG.CATEGORIES){const c=COLORS[cat.color],a=state.filterCat===cat.id;h+=`<button class="filter-btn" data-cat="${cat.id}" style="${a?`border-color:${c.bg};background:${c.light};color:${c.text}`:''}">${cat.emoji}${cat.id}</button>`}
  h+=`<button class="filter-btn ${state.showCancelled?'active-all':''}" id="btn-cancelled">${state.showCancelled?'🔓':'🔒'}취소</button>`;
  return h+`</div>`}
 
function renderCalendar(){
  if(state.loading)return`<div class="cal-card"><div class="loading-overlay"><div class="spinner"></div><div style="font-size:10px;font-family:'DotGothic16',monospace">LOADING... 🌸</div></div></div>`;
  if(state.error)return`<div class="error-msg">ERROR! ${state.error}</div>`;
  return state.view==='month'?renderMonth():renderWeek()}
 
function renderEvBar(ev,ds,dow){
  const col=catColor(ev.category),isStart=ds===ev.date,isEnd=ds===ev.endDate;
  let barCls='bar-mid';if(isStart&&isEnd)barCls='bar-single';else if(isStart)barCls='bar-start';else if(isEnd)barCls='bar-end';
  const label=isStart?ev.title:(dow===0?ev.title:'');
  const bc=col.bg,bg=col.bg+'33';
  let s;if(barCls==='bar-start')s=`background:${bg};border-left-color:${bc};color:${col.text}`;
  else if(barCls==='bar-end')s=`background:${bg};border-right-color:${bc};color:${col.text}`;
  else if(barCls==='bar-single')s=`background:${bg};border-left-color:${bc};color:${col.text}`;
  else s=`background:${bg};color:${col.text}`;
  return`<a class="ev-bar ${barCls}" href="${ev.url}" target="_blank" style="${s}" title="${ev.title}">${label||'&nbsp;'}</a>`;
}
 
function renderMonth(){
  const d=state.currentDate,days=getMonthDays(d.getFullYear(),d.getMonth()),td=todayStr();
  let h=`<div class="cal-card"><table class="month-table"><thead><tr>`;
  for(let i=0;i<7;i++){const cls=i===6?'sun':i===5?'sat':'';h+=`<th class="${cls}">${DAYS[i]}</th>`}
  h+=`</tr></thead><tbody>`;
  for(let r=0;r<6;r++){h+=`<tr>`;for(let c=0;c<7;c++){
    const idx=r*7+c,day=days[idx],ds=fmt(day.date),isToday=ds===td,dow=getDowMon(day.date);
    const isSun=dow===6,isSat=dow===5,evs=eventsOn(ds);
    h+=`<td class="${day.cur?'':'other'} ${isToday?'today-cell':''}" data-date="${ds}">`;
    h+=`<div class="date-tap">`;
    if(isToday)h+=`<span class="date-num today">${day.date.getDate()}</span>`;
    else h+=`<span class="date-num ${isSun?'sun':''} ${isSat?'sat':''}">${day.date.getDate()}</span>`;
    h+=`</div><div class="ev-area">`;
    const me=evs.filter(e=>e.isMultiDay),se=evs.filter(e=>!e.isMultiDay);
    let shown=0;const mx=3;
    for(const ev of me){if(shown>=mx)break;h+=renderEvBar(ev,ds,dow);shown++;}
    for(const ev of se){if(shown>=mx)break;const col=catColor(ev.category);h+=`<a class="ev-pill" href="${ev.url}" target="_blank" style="background:${col.light};border-left-color:${col.bg};color:${col.text}" title="${ev.title}">${ev.title}</a>`;shown++;}
    if(me.length+se.length>mx)h+=`<div class="ev-more" data-date="${ds}">+${me.length+se.length-mx}</div>`;
    h+=`</div></td>`;}h+=`</tr>`;}
  return h+`</tbody></table></div>`}
 
function renderWeek(){
  const wk=getWeekDays(state.currentDate),td=todayStr();
  let h=`<div class="cal-card"><table class="week-table"><thead><tr>`;
  for(let i=0;i<7;i++){const cls=i===6?'sun':i===5?'sat':'';h+=`<th class="${cls}">${DAYS[i]}</th>`}
  h+=`</tr></thead><tbody><tr>`;
  for(const wd of wk){const ds=fmt(wd),isToday=ds===td;h+=`<td class="${isToday?'today-cell':''}" data-date="${ds}" style="border-bottom:2px solid #F8BBD0"><div class="week-date-header"><span class="week-date-num ${isToday?'today':''}">${wd.getDate()}</span></div></td>`}
  h+=`</tr><tr>`;
  for(const wd of wk){const ds=fmt(wd),isToday=ds===td,dow=getDowMon(wd),evs=eventsOn(ds);
    h+=`<td class="${isToday?'today-cell':''}" data-date="${ds}" style="vertical-align:top;padding:2px 1px"><div class="week-events">`;
    for(const ev of evs.filter(e=>e.isMultiDay))h+=renderEvBar(ev,ds,dow);
    for(const ev of evs.filter(e=>!e.isMultiDay)){const col=catColor(ev.category);h+=`<a class="week-ev-pill" href="${ev.url}" target="_blank" style="background:${col.light};border-left-color:${col.bg};color:${col.text}" title="${ev.title}">${ev.title}</a>`}
    if(!evs.length)h+=`<div style="height:20px"></div>`;
    h+=`</div></td>`}
  h+=`</tr></tbody></table></div>`;return h}
 
function renderDetail(){
  if(!state.selectedDate)return'';const evs=eventsOn(state.selectedDate);
  const[y,m,dd]=state.selectedDate.split('-').map(Number);
  let h=`<div class="detail-panel"><div class="detail-title"><div class="detail-title-left">🌸 ${m}/${dd} <div class="detail-count">${evs.length}</div></div><button class="add-btn" id="btn-add">＋추가</button></div>`;
  for(const ev of evs){const col=catColor(ev.category),ci=catInfo(ev.category);
    const info=ev.isMultiDay?`${ev.date}~${ev.endDate}`:(ev.time||'종일');
    h+=`<a class="detail-item" href="${ev.url}" target="_blank" style="border-color:${col.bg}33"><div class="detail-icon" style="background:${col.light};border-color:${col.bg}">${ci.emoji}</div><div class="detail-info"><div class="detail-name" style="color:${col.text}">${ev.title}</div><div class="detail-meta">${info} · ${ev.category||'기타'}</div></div><div class="detail-arrow">▶</div></a>`}
  if(!evs.length)h+=`<div style="font-size:9px;color:var(--text-dim);text-align:center;padding:8px;font-family:'DotGothic16',monospace">일정이 없어요</div>`;
  return h+`</div>`}
 
function renderAddForm(){
  if(state.addMsg&&!state.showAddForm)return`<div class="add-msg" style="color:var(--accent)">${state.addMsg}</div>`;
  if(!state.showAddForm||!state.selectedDate)return'';
  return`<div class="add-form">
    <div class="add-form-title">🌸 ${state.selectedDate} 일정 추가</div>
    <label>제목</label><input type="text" id="add-title" placeholder="일정 이름">
    <label>유형</label><select id="add-type"><option value="약속">🌸 약속</option><option value="개인">✏️ 개인</option><option value="업무">💼 업무</option></select>
    <div id="people-row"><label>만나는 사람 (쉼표로 구분)</label><input type="text" id="add-people" placeholder="예: 홍길동, 김철수"></div>
    <label>종료일 (선택)</label><input type="date" id="add-end">
    <div class="add-form-btns"><button class="add-submit" id="btn-add-submit">🌸 추가!</button><button class="add-cancel" id="btn-add-cancel">취소</button></div>
    ${state.addMsg?`<div class="add-msg" style="color:${state.addMsg.startsWith('❌')?'#C62828':'var(--accent)'}">${state.addMsg}</div>`:''}
  </div>`}
 
function bindEvents(){
  document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{state.view=b.dataset.view;state.selectedDate=null;state.showAddForm=false;state.addMsg='';render();fetchRange()}));
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{const v=b.dataset.nav;if(v==='today')state.currentDate=new Date();else{const dir=parseInt(v),d=new Date(state.currentDate);if(state.view==='month')d.setMonth(d.getMonth()+dir);else d.setDate(d.getDate()+dir*7);state.currentDate=d}state.selectedDate=null;state.showAddForm=false;state.addMsg='';render();fetchRange()}));
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{const c=b.dataset.cat;state.filterCat=c===state.filterCat||c===''?null:c;state.selectedDate=null;state.showAddForm=false;render()}));
 
  document.querySelectorAll('.date-tap, .ev-more').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const td=el.closest('td[data-date]');if(!td)return;
      const ds=td.dataset.date;
      state.selectedDate=state.selectedDate===ds?null:ds;
      state.showAddForm=false;state.addMsg='';render();
    });
  });
 
  document.querySelectorAll('td[data-date]').forEach(td=>td.addEventListener('click',(e)=>{
    if(e.target.closest('.ev-pill')||e.target.closest('.ev-bar')||e.target.closest('.week-ev-pill')||e.target.closest('.date-tap')||e.target.closest('.ev-more'))return;
    const ds=td.dataset.date;
    state.selectedDate=state.selectedDate===ds?null:ds;
    state.showAddForm=false;state.addMsg='';render();
  }));

  document.getElementById('btn-cancelled')?.addEventListener('click',()=>{state.showCancelled=!state.showCancelled;render();});
  document.getElementById('btn-add')?.addEventListener('click',()=>{state.showAddForm=true;state.addMsg='';render();});
  document.getElementById('add-type')?.addEventListener('change',(e)=>{const row=document.getElementById('people-row');if(row)row.style.display=e.target.value==='약속'?'block':'none';});
  document.getElementById('btn-add-submit')?.addEventListener('click',()=>{
    const title=document.getElementById('add-title')?.value.trim();
    const type=document.getElementById('add-type')?.value;
    const endDate=document.getElementById('add-end')?.value;
    const people=document.getElementById('add-people')?.value||'';
    if(!title){state.addMsg='❌ 제목을 입력하세요';render();return;}
    createEvent(title,state.selectedDate,type,endDate||null,people);
  });
  document.getElementById('btn-add-cancel')?.addEventListener('click',()=>{state.showAddForm=false;state.addMsg='';render();});
}
 
render();
if(state.configured)fetchRange();
</script>
</body>
</html>
