<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 Notion Calendar</title>
  <!-- assets 레포 대신 상대경로로 덮어씌우기 -->
<link rel="icon" href="./favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF0F3;--card:#FFFFFF;--card-border:#F8BBD0;
    --surface:#FFF5F7;--hover:#FCE4EC;
    --text:#4A2040;--text-dim:#AD7A99;--text-muted:#D4A0BD;
    --accent:#E91E63;--accent-light:#FCE4EC;--accent-glow:rgba(233,30,99,0.12);
    --grid-line:rgba(233,30,99,0.06);
    --pixel-border:2px solid #F8BBD0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;overflow-x:hidden}
  body{font-family:'Gowun Dodum','DotGothic16',sans-serif;background:var(--bg);color:var(--text);padding:3px}
  .app{width:100%}

  /* ── pixel utility ── */
  .pixel-box{border:var(--pixel-border);border-radius:0;box-shadow:2px 2px 0 #F8BBD0}
  .pixel-btn{border:2px solid #F48FB1;border-radius:0;box-shadow:1px 1px 0 #F48FB1;image-rendering:pixelated}

  /* ── Header ── */
  .header{display:flex;align-items:center;justify-content:space-between;padding:3px 2px;margin-bottom:4px}
  .header-left{display:flex;align-items:center;gap:4px;min-width:0}
  .logo{width:24px;height:24px;border:2px solid #F06292;background:#FCE4EC;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;box-shadow:2px 2px 0 #F48FB1}
  .header-title{font-size:13px;font-weight:800;font-family:'DotGothic16',monospace;color:var(--accent);white-space:nowrap}
  .header-sub{font-size:7px;color:var(--text-dim);font-family:'DotGothic16',monospace}
  .header-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
  .view-toggle{display:flex;background:#FCE4EC;padding:1px;border:2px solid #F48FB1;box-shadow:1px 1px 0 #F48FB1}
  .view-btn{border:none;padding:2px 6px;font-size:9px;font-weight:700;cursor:pointer;font-family:'DotGothic16',monospace;background:transparent;color:var(--text-dim)}
  .view-btn.active{background:#F06292;color:#fff;box-shadow:inset 1px 1px 0 #E91E63}
  .nav-btn{width:20px;height:20px;border:2px solid #F48FB1;background:#FCE4EC;cursor:pointer;font-size:11px;color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'DotGothic16',monospace;box-shadow:1px 1px 0 #F48FB1}
  .nav-btn:active{box-shadow:none;transform:translate(1px,1px)}
  .today-btn{height:20px;padding:0 4px;border:2px solid #F48FB1;background:#FCE4EC;cursor:pointer;font-size:7px;font-weight:700;color:var(--accent);font-family:'DotGothic16',monospace;box-shadow:1px 1px 0 #F48FB1}
  .today-btn:active{box-shadow:none;transform:translate(1px,1px)}

  /* ── Filters ── */
  .filters{display:flex;gap:2px;margin-bottom:4px;padding:0 2px}
  .filter-btn{padding:2px 6px;font-size:9px;font-weight:700;cursor:pointer;font-family:'DotGothic16',monospace;background:#FCE4EC;border:2px solid #F8BBD0;color:var(--text-dim);box-shadow:1px 1px 0 #F8BBD0}
  .filter-btn:active{box-shadow:none;transform:translate(1px,1px)}
  .filter-btn.active-all{border-color:#E91E63;background:#F06292;color:#fff;box-shadow:1px 1px 0 #C2185B}

  /* ── Cal Card ── */
  .cal-card{background:var(--card);border:2px solid #F48FB1;overflow:hidden;width:100%;box-shadow:3px 3px 0 #F8BBD0}

  /* ── Month Table ── */
  .month-table{width:100%;border-collapse:collapse;table-layout:fixed}
  .month-table th{padding:4px 0;text-align:center;font-size:9px;font-weight:700;font-family:'DotGothic16',monospace;color:var(--text-dim);border-bottom:2px solid #F8BBD0;background:#FFF5F7}
  .month-table th.sun{color:#E53935}
  .month-table th.sat{color:#1976D2}
  .month-table td{
    padding:1px;vertical-align:top;
    border-right:1px solid var(--grid-line);border-bottom:1px solid var(--grid-line);
    height:48px;cursor:pointer;overflow:hidden;
  }
  .month-table td:last-child{border-right:none}
  .month-table td:hover{background:var(--hover)}
  .month-table td.other{opacity:.2}
  .month-table td.today-cell{background:#FCE4EC}

  .date-num{font-size:10px;font-weight:700;color:var(--text);margin-bottom:1px;text-align:center;font-family:'DotGothic16',monospace}
  .date-num.today{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:#F06292;color:#fff;font-weight:800;border:2px solid #C2185B;box-shadow:1px 1px 0 #E91E63;animation:blink 1.5s step-end infinite}
  .date-num.sun{color:#E53935}.date-num.sat{color:#1976D2}

  /* ── Event Pill (pixel style) ── */
  .ev-pill{padding:1px 2px;margin-bottom:1px;font-size:8px;font-weight:600;border-left:2px solid;cursor:pointer;display:block;text-decoration:none;line-height:1.3;word-break:break-all;white-space:normal;font-family:'Gowun Dodum',sans-serif}
  .ev-more{font-size:7px;color:var(--text-dim);font-weight:600;text-align:center;font-family:'DotGothic16',monospace}

  /* ── Multi-day Bar (pixel style) ── */
  .ev-bar{padding:1px 2px;margin-bottom:1px;font-size:8px;font-weight:700;cursor:pointer;display:block;text-decoration:none;line-height:1.3;word-break:break-all;white-space:normal;font-family:'Gowun Dodum',sans-serif}
  .ev-bar.bar-start{margin-right:-1px}
  .ev-bar.bar-mid{margin-left:-1px;margin-right:-1px}
  .ev-bar.bar-end{margin-left:-1px}

  /* ── Week View ── */
  .week-headers{width:100%;border-collapse:collapse;table-layout:fixed}
  .week-headers th{padding:4px 0;text-align:center;font-size:9px;font-weight:700;font-family:'DotGothic16',monospace;color:var(--text-dim);border-bottom:2px solid #F8BBD0;background:#FFF5F7}
  .week-headers th.sun{color:#E53935}.week-headers th.sat{color:#1976D2}
  .week-headers th.time-th{width:24px}
  .week-dates{width:100%;border-collapse:collapse;table-layout:fixed}
  .week-dates td{padding:2px 0;text-align:center;border-bottom:2px solid #F8BBD0}
  .week-dates td.time-td{width:24px}
  .week-date-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;font-weight:800;font-size:10px;font-family:'DotGothic16',monospace;color:var(--text)}
  .week-date-num.today{background:#F06292;color:#fff;border:2px solid #C2185B;box-shadow:1px 1px 0 #E91E63}
  .week-scroll{overflow-y:auto;max-height:320px;position:relative}
  .week-grid{display:grid;grid-template-columns:24px 1fr;position:relative}
  .time-label{height:36px;display:flex;align-items:flex-start;justify-content:center;font-size:7px;color:var(--text-muted);font-weight:600;font-family:'DotGothic16',monospace}
  .events-area{position:relative}
  .hour-line{height:36px;border-bottom:1px dashed var(--grid-line)}
  .hour-half{height:18px;border-bottom:1px dotted rgba(233,30,99,0.03)}
  .day-divider{position:absolute;top:0;bottom:0;border-left:1px dashed var(--grid-line)}
  .week-block{position:absolute;padding:1px 2px;color:#fff;font-size:7px;font-weight:600;overflow:hidden;cursor:pointer;z-index:2;text-decoration:none;display:block;line-height:1.2;font-family:'Gowun Dodum',sans-serif;border:1px solid rgba(255,255,255,0.3)}
  .week-block-time{font-size:6px;opacity:.8;font-family:'DotGothic16',monospace}
  .now-line{position:absolute;left:0;right:0;height:2px;z-index:10;pointer-events:none;background:#E91E63}
  .now-dot{position:absolute;top:-2px;width:6px;height:6px;background:#E91E63;border:1px solid #C2185B}

  /* ── Detail Panel ── */
  .detail-panel{margin-top:4px;background:var(--card);padding:8px;border:2px solid #F48FB1;box-shadow:2px 2px 0 #F8BBD0;animation:fadeIn .2s ease}
  .detail-title{font-size:11px;font-weight:800;font-family:'DotGothic16',monospace;margin-bottom:5px;display:flex;align-items:center;gap:4px;color:var(--accent)}
  .detail-count{background:#F06292;color:#fff;padding:0 5px;font-size:8px;border:1px solid #C2185B}
  .detail-item{display:flex;align-items:center;gap:5px;padding:5px 6px;margin-bottom:3px;cursor:pointer;text-decoration:none;color:inherit;border:1px solid var(--grid-line);background:var(--surface)}
  .detail-item:hover{background:var(--hover)}
  .detail-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;border:1px solid #F8BBD0;background:#FCE4EC}
  .detail-info{flex:1;min-width:0}
  .detail-name{font-weight:700;font-size:10px}
  .detail-meta{font-size:8px;color:var(--text-dim);margin-top:1px;font-family:'DotGothic16',monospace}
  .detail-arrow{color:var(--text-muted);font-size:10px;flex-shrink:0;font-family:'DotGothic16',monospace}

  /* ── Setup ── */
  .setup-overlay{display:flex;align-items:center;justify-content:center;min-height:80vh}
  .setup-box{background:var(--card);border:3px solid #F48FB1;padding:16px 12px;width:100%;max-width:360px;box-shadow:4px 4px 0 #F8BBD0}
  .setup-logo{width:40px;height:40px;border:3px solid #F06292;background:#FCE4EC;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 8px;box-shadow:2px 2px 0 #F48FB1}
  .setup-title{text-align:center;font-size:16px;font-weight:800;font-family:'DotGothic16',monospace;color:var(--accent);margin-bottom:3px}
  .setup-desc{text-align:center;font-size:10px;color:var(--text-dim);margin-bottom:14px;line-height:1.5}
  .setup-label{font-size:9px;font-weight:700;color:var(--text-dim);margin-bottom:3px;font-family:'DotGothic16',monospace}
  .setup-input{width:100%;padding:7px 8px;border:2px solid #F8BBD0;background:var(--surface);color:var(--text);font-size:10px;font-family:inherit;outline:none;margin-bottom:8px}
  .setup-input:focus{border-color:#E91E63}
  .setup-btn{width:100%;padding:9px;border:2px solid #C2185B;background:#F06292;color:#fff;font-weight:800;font-size:11px;cursor:pointer;font-family:'DotGothic16',monospace;box-shadow:2px 2px 0 #E91E63}
  .setup-btn:active{box-shadow:none;transform:translate(2px,2px)}
  .setup-hint{margin-top:8px;padding:7px;background:var(--surface);border:2px solid #F8BBD0;font-size:8px;color:var(--text-dim);line-height:1.6}
  .setup-hint code{background:#FCE4EC;color:var(--accent);padding:0 3px;border:1px solid #F8BBD0;font-size:8px;font-family:'DotGothic16',monospace}
  .setup-step{display:flex;align-items:flex-start;gap:4px;margin-bottom:4px}
  .setup-step-num{width:14px;height:14px;flex-shrink:0;background:#F06292;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1px solid #C2185B;font-family:'DotGothic16',monospace}

  .loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 8px;color:var(--text-dim)}
  .spinner{width:20px;height:20px;border:3px solid #F8BBD0;border-top:3px solid #E91E63;animation:spin .8s steps(8) infinite;margin-bottom:6px}
  .error-msg{padding:8px;background:#FFEBEE;color:#C62828;border:2px solid #EF9A9A;font-size:10px;text-align:center;margin:8px 2px;font-family:'DotGothic16',monospace}

  @media(min-width:641px){
    body{padding:16px}
    .app{max-width:960px;margin:0 auto}
    .header{margin-bottom:10px;padding:0}
    .logo{width:32px;height:32px;font-size:16px}
    .header-title{font-size:18px}
    .header-sub{font-size:10px}
    .view-btn{padding:4px 10px;font-size:12px}
    .nav-btn{width:28px;height:28px;font-size:14px}
    .today-btn{height:28px;padding:0 8px;font-size:9px}
    .filters{gap:4px;margin-bottom:8px;padding:0}
    .filter-btn{padding:3px 10px;font-size:10px}
    .month-table th{font-size:12px;padding:6px 0}
    .month-table td{height:80px;padding:3px}
    .date-num{font-size:13px}
    .ev-pill{font-size:10px;padding:1px 4px;border-left-width:3px}
    .ev-bar{font-size:10px;padding:1px 4px}
    .ev-more{font-size:9px}
    .detail-panel{padding:12px;margin-top:8px}
    .detail-name{font-size:12px}
    .detail-meta{font-size:9px}
    .detail-icon{width:28px;height:28px;font-size:13px}
    .week-headers th{font-size:12px}
    .week-headers th.time-th{width:40px}
    .week-dates td.time-td{width:40px}
    .week-date-num{width:28px;height:28px;font-size:14px}
    .week-grid{grid-template-columns:40px 1fr}
    .week-scroll{max-height:440px}
    .time-label{height:44px;font-size:9px}
    .hour-line{height:44px}
    .hour-half{height:22px}
    .week-block{font-size:9px;padding:2px 4px}
    .week-block-time{font-size:7px}
  }

  @keyframes blink{0%,100%{opacity:1}50%{opacity:.7}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CONFIG={
  WORKER_URL:'https://lingering-art-15ef-notion-proxy.abyss9405.workers.dev',
  DATABASE_ID:'1ff6b59b151a8173b350ea75f155aa8d',
  PROPS:{title:'제목',date:'날짜',category:'카테고리',duration:'소요시간'},
  CATEGORIES:[{id:'업무',emoji:'💼',color:'rose'},{id:'개인',emoji:'🌸',color:'peach'}],
};
const COLORS={
  rose:{bg:'#F06292',light:'#FCE4EC',text:'#C2185B'},
  peach:{bg:'#FFAB91',light:'#FBE9E7',text:'#D84315'},
  berry:{bg:'#CE93D8',light:'#F3E5F5',text:'#7B1FA2'},
  sky:{bg:'#81D4FA',light:'#E1F5FE',text:'#0277BD'},
  coral:{bg:'#EF5350',light:'#FFEBEE',text:'#C62828'},
  steel:{bg:'#B0BEC5',light:'#ECEFF1',text:'#546E7A'},
};
const DAYS=['월','화','수','목','금','토','일'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const HOURS=Array.from({length:16},(_,i)=>i+6);

let state={view:'month',currentDate:new Date(),events:[],selectedDate:null,filterCat:null,loading:false,error:null,configured:!!(CONFIG.WORKER_URL&&CONFIG.DATABASE_ID)};

async function fetchEvents(start,end){
  state.loading=true;state.error=null;render();
  try{
    const res=await fetch(CONFIG.WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({database_id:CONFIG.DATABASE_ID,filter:{and:[{property:CONFIG.PROPS.date,date:{on_or_after:start}},{property:CONFIG.PROPS.date,date:{on_or_before:end}}]},sorts:[{property:CONFIG.PROPS.date,direction:'ascending'}],page_size:100})});
    if(!res.ok)throw new Error(`API 오류 (${res.status})`);
    const data=await res.json();
    state.events=(data.results||[]).map(p=>{
      const pr=p.properties,dateObj=pr[CONFIG.PROPS.date]?.date;
      const startVal=dateObj?.start||'',endVal=dateObj?.end||'';
      const[d,t]=startVal.includes('T')?startVal.split('T'):[startVal,''];
      const endDate=endVal?endVal.split('T')[0]:'';
      return{id:p.id,url:p.url||`https://notion.so/${p.id.replace(/-/g,'')}`,title:pr[CONFIG.PROPS.title]?.title?.[0]?.plain_text||'(제목 없음)',date:d,endDate,time:t?t.slice(0,5):'',category:pr[CONFIG.PROPS.category]?.select?.name||'',duration:pr[CONFIG.PROPS.duration]?.number||30,isMultiDay:!!(endDate&&endDate!==d)};
    });
    state.loading=false;render();
  }catch(e){state.loading=false;state.error=e.message;render();}
}

function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return fmt(new Date())}
function getMonthDays(y,m){
  const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  let fd=new Date(y,m,1).getDay();fd=fd===0?6:fd-1;
  const days=[];
  for(let i=fd-1;i>=0;i--)days.push({date:new Date(y,m-1,prev-i),cur:false});
  for(let i=1;i<=dim;i++)days.push({date:new Date(y,m,i),cur:true});
  while(days.length<42){const n=days.length-fd-dim+1;days.push({date:new Date(y,m+1,n),cur:false})}
  return days;
}
function getWeekDays(d){
  const s=new Date(d);let day=s.getDay();
  s.setDate(s.getDate()+(day===0?-6:1-day));
  return Array.from({length:7},(_,i)=>{const w=new Date(s);w.setDate(s.getDate()+i);return w});
}
function getDowMon(d){const dow=d.getDay();return dow===0?6:dow-1;}
function eventsOn(ds){
  let evs=state.events.filter(e=>e.isMultiDay?(ds>=e.date&&ds<=e.endDate):e.date===ds);
  if(state.filterCat){
    if(state.filterCat==='업무')evs=evs.filter(e=>e.category!=='개인');
    else if(state.filterCat==='개인')evs=evs.filter(e=>e.category==='개인'||e.category==='공휴일');
  }
  return evs;
}
function catInfo(n){return CONFIG.CATEGORIES.find(c=>c.id===n)||{emoji:'📌',color:'steel'}}
function catColor(n){
  const c=CONFIG.CATEGORIES.find(cat=>cat.id===n);
  if(c)return COLORS[c.color]||COLORS.steel;
  if(n==='공휴일')return COLORS['coral'];
  return COLORS['rose'];
}
function fetchRange(){const d=state.currentDate;if(state.view==='month'){const y=d.getFullYear(),m=d.getMonth();fetchEvents(fmt(new Date(y,m-1,20)),fmt(new Date(y,m+1,10)))}else{const wk=getWeekDays(d);fetchEvents(fmt(wk[0]),fmt(wk[6]))}}

function render(){
  const app=document.getElementById('app');
  if(!state.configured){app.innerHTML=renderSetup();bindSetup();return}
  app.innerHTML=renderHeader()+renderFilters()+renderCalendar()+renderDetail();
  bindEvents();
}

function renderSetup(){
  return`<div class="setup-overlay"><div class="setup-box">
    <div class="setup-logo">🌸</div>
    <div class="setup-title">Notion Calendar</div>
    <div class="setup-desc">노션 DB와 연결하여 일정을 확인하세요</div>
    <div class="setup-label">🔗 Worker URL</div>
    <input class="setup-input" id="inp-worker" value="${CONFIG.WORKER_URL}">
    <div class="setup-label">🗄️ Database ID</div>
    <input class="setup-input" id="inp-dbid" value="${CONFIG.DATABASE_ID}">
    <button class="setup-btn" id="btn-connect">🌸 START!</button>
    <div class="setup-hint">
      <div style="font-weight:700;margin-bottom:3px;color:var(--text)">📋 GUIDE</div>
      <div class="setup-step"><div class="setup-step-num">1</div><div>노션 DB에 <code>제목</code> <code>날짜</code> <code>카테고리</code></div></div>
      <div class="setup-step"><div class="setup-step-num">2</div><div><a href="https://www.notion.so/my-integrations" target="_blank" style="color:var(--accent)">notion.so/my-integrations</a></div></div>
      <div class="setup-step"><div class="setup-step-num">3</div><div>Cloudflare Worker + <code>worker.js</code></div></div>
      <div class="setup-step"><div class="setup-step-num">4</div><div>입력 후 START!</div></div>
    </div>
  </div></div>`}
function bindSetup(){const b=document.getElementById('btn-connect'),w=document.getElementById('inp-worker'),d=document.getElementById('inp-dbid');if(!b)return;b.addEventListener('click',()=>{CONFIG.WORKER_URL=w.value.trim();CONFIG.DATABASE_ID=d.value.trim();if(CONFIG.WORKER_URL&&CONFIG.DATABASE_ID){state.configured=true;render();fetchRange()}})}

function renderHeader(){
  const d=state.currentDate;let title;
  if(state.view==='month')title=`${d.getFullYear()}년 ${MONTHS[d.getMonth()]}`;
  else{const wk=getWeekDays(d),s=wk[0],e=wk[6];title=s.getMonth()===e.getMonth()?`${MONTHS[s.getMonth()]} ${s.getDate()}–${e.getDate()}일`:`${MONTHS[s.getMonth()]} ${s.getDate()}–${MONTHS[e.getMonth()]} ${e.getDate()}일`}
  const cm=state.events.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===d.getMonth()&&ed.getFullYear()===d.getFullYear()}).length;
  return`<div class="header"><div class="header-left"><div class="logo">🌸</div><div><div class="header-title">${title}</div><div class="header-sub">${cm}개 / ${state.events.length}개</div></div></div><div class="header-right"><div class="view-toggle"><button class="view-btn ${state.view==='month'?'active':''}" data-view="month">Month</button><button class="view-btn ${state.view==='week'?'active':''}" data-view="week">Week</button></div><button class="nav-btn" data-nav="-1">◀</button><button class="today-btn" data-nav="today">TODAY</button><button class="nav-btn" data-nav="1">▶</button></div></div>`}

function renderFilters(){
  let h=`<div class="filters"><button class="filter-btn ${!state.filterCat?'active-all':''}" data-cat="">ALL</button>`;
  for(const cat of CONFIG.CATEGORIES){const c=COLORS[cat.color],a=state.filterCat===cat.id;h+=`<button class="filter-btn" data-cat="${cat.id}" style="${a?`border-color:${c.bg};background:${c.light};color:${c.text}`:''}">${cat.emoji}${cat.id}</button>`}
  return h+`</div>`}

function renderCalendar(){
  if(state.loading)return`<div class="cal-card"><div class="loading-overlay"><div class="spinner"></div><div style="font-size:10px;font-family:'DotGothic16',monospace">LOADING... 🌸</div></div></div>`;
  if(state.error)return`<div class="error-msg">ERROR! ${state.error}</div>`;
  return state.view==='month'?renderMonth():renderWeek()}

function renderMonth(){
  const d=state.currentDate,days=getMonthDays(d.getFullYear(),d.getMonth()),td=todayStr();
  let h=`<div class="cal-card"><table class="month-table"><thead><tr>`;
  for(let i=0;i<7;i++){const cls=i===6?'sun':i===5?'sat':'';h+=`<th class="${cls}">${DAYS[i]}</th>`}
  h+=`</tr></thead><tbody>`;
  for(let r=0;r<6;r++){
    h+=`<tr>`;
    for(let c=0;c<7;c++){
      const idx=r*7+c,day=days[idx];
      const ds=fmt(day.date),isToday=ds===td,dow=getDowMon(day.date);
      const isSun=dow===6,isSat=dow===5,evs=eventsOn(ds);
      h+=`<td class="${day.cur?'':'other'} ${isToday?'today-cell':''}" data-date="${ds}">`;
      if(isToday)h+=`<div style="text-align:center"><span class="date-num today">${day.date.getDate()}</span></div>`;
      else h+=`<div class="date-num ${isSun?'sun':''} ${isSat?'sat':''}">${day.date.getDate()}</div>`;
      const multiEvs=evs.filter(e=>e.isMultiDay),singleEvs=evs.filter(e=>!e.isMultiDay);
      let shown=0;const maxShow=2;
      for(const ev of multiEvs){
        if(shown>=maxShow)break;
        const col=catColor(ev.category),isStart=ds===ev.date,isEnd=ds===ev.endDate;
        let barCls='bar-mid';
        if(isStart&&isEnd)barCls='bar-single';else if(isStart)barCls='bar-start';else if(isEnd)barCls='bar-end';
        const label=isStart?ev.title:(dow===0?ev.title:'');
        h+=`<a class="ev-bar ${barCls}" href="${ev.url}" target="_blank" style="background:${col.bg}55;color:${col.text};border-left:2px solid ${col.bg}" title="${ev.title}">${label||'&nbsp;'}</a>`;
        shown++;
      }
      for(const ev of singleEvs){
        if(shown>=maxShow)break;
        const col=catColor(ev.category);
        h+=`<a class="ev-pill" href="${ev.url}" target="_blank" style="background:${col.light};border-left-color:${col.bg};color:${col.text}" title="${ev.title}">${ev.title}</a>`;
        shown++;
      }
      if(multiEvs.length+singleEvs.length>maxShow)h+=`<div class="ev-more">+${multiEvs.length+singleEvs.length-maxShow}</div>`;
      h+=`</td>`;
    }
    h+=`</tr>`;
  }
  return h+`</tbody></table></div>`}

function renderWeek(){
  const wk=getWeekDays(state.currentDate),td=todayStr(),hh=36;
  let h=`<div class="cal-card"><table class="week-headers"><tr><th class="time-th">⏰</th>`;
  for(let i=0;i<7;i++){const cls=i===6?'sun':i===5?'sat':'';h+=`<th class="${cls}">${DAYS[i]}</th>`}
  h+=`</tr></table><table class="week-dates"><tr><td class="time-td"></td>`;
  for(const wd of wk){const ds=fmt(wd),isToday=ds===td;h+=`<td><span class="week-date-num ${isToday?'today':''}">${wd.getDate()}</span></td>`}
  h+=`</tr></table><div class="week-scroll"><div class="week-grid"><div>`;
  for(const hr of HOURS)h+=`<div class="time-label">${String(hr).padStart(2,'0')}</div>`;
  h+=`</div><div class="events-area">`;
  for(const hr of HOURS)h+=`<div class="hour-line"><div class="hour-half"></div></div>`;
  for(let i=1;i<7;i++)h+=`<div class="day-divider" style="left:${i*(100/7)}%"></div>`;
  for(let di=0;di<7;di++){const ds=fmt(wk[di]),evs=eventsOn(ds);for(const ev of evs){
    if(!ev.time)continue;
    const[ehh,emm]=ev.time.split(':').map(Number);
    const top=((ehh-6)*60+emm)*(hh/60),height=Math.max((ev.duration||30)*(hh/60),14);const col=catColor(ev.category);
    h+=`<a class="week-block" href="${ev.url}" target="_blank" style="top:${top}px;left:calc(${di*(100/7)}% + 1px);width:calc(${100/7}% - 2px);height:${height}px;background:${col.bg}cc"><div class="week-block-time">${ev.time}</div><div>${ev.title}</div></a>`}}
  const now=new Date(),tidx=wk.findIndex(w=>fmt(w)===td);
  if(tidx>=0&&now.getHours()>=6&&now.getHours()<22){const top=((now.getHours()-6)*60+now.getMinutes())*(hh/60);h+=`<div class="now-line" style="top:${top}px"><div class="now-dot" style="left:calc(${tidx*(100/7)}%)"></div></div>`}
  return h+`</div></div></div></div>`}

function renderDetail(){
  if(!state.selectedDate)return'';const evs=eventsOn(state.selectedDate);if(!evs.length)return'';
  const[y,m,dd]=state.selectedDate.split('-').map(Number);
  let h=`<div class="detail-panel"><div class="detail-title">🌸 ${m}/${dd} <div class="detail-count">${evs.length}</div></div>`;
  for(const ev of evs){const col=catColor(ev.category),ci=catInfo(ev.category);
    const info=ev.isMultiDay?`${ev.date}~${ev.endDate}`:(ev.time||'종일');
    h+=`<a class="detail-item" href="${ev.url}" target="_blank" style="border-color:${col.bg}33"><div class="detail-icon" style="background:${col.light};border-color:${col.bg}">${ci.emoji}</div><div class="detail-info"><div class="detail-name" style="color:${col.text}">${ev.title}</div><div class="detail-meta">${info} · ${ev.category||'기타'}</div></div><div class="detail-arrow">▶</div></a>`}
  return h+`</div>`}

function bindEvents(){
  document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{state.view=b.dataset.view;state.selectedDate=null;render();fetchRange()}));
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{const v=b.dataset.nav;if(v==='today')state.currentDate=new Date();else{const dir=parseInt(v),d=new Date(state.currentDate);if(state.view==='month')d.setMonth(d.getMonth()+dir);else d.setDate(d.getDate()+dir*7);state.currentDate=d}state.selectedDate=null;render();fetchRange()}));
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{const c=b.dataset.cat;state.filterCat=c===state.filterCat||c===''?null:c;state.selectedDate=null;render()}));
  document.querySelectorAll('td[data-date]').forEach(td=>td.addEventListener('click',(e)=>{if(e.target.closest('.ev-pill')||e.target.closest('.ev-bar'))return;const ds=td.dataset.date;state.selectedDate=state.selectedDate===ds?null:ds;render()}))}

render();
if(state.configured)fetchRange();
</script>
</body>
</html>
