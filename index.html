<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notion Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e17;--card:#111827;--card-border:#1e293b;
    --surface:#1a2332;--hover:#1e2d3d;
    --text:#e2e8f0;--text-dim:#64748b;--text-muted:#475569;
    --accent:#2D7FF9;--accent-glow:rgba(45,127,249,0.25);
    --grid-line:rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;overflow-x:hidden}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:2px}
  .app{width:100%}

  .header{display:flex;align-items:center;justify-content:space-between;padding:3px 2px;margin-bottom:3px}
  .header-left{display:flex;align-items:center;gap:4px;min-width:0}
  .logo{width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg,var(--accent),#18DCFF);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
  .header-title{font-size:13px;font-weight:800;background:linear-gradient(135deg,var(--accent),#18DCFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
  .header-sub{font-size:7px;color:var(--text-dim)}
  .header-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
  .view-toggle{display:flex;background:var(--card);border-radius:4px;padding:1px;border:1px solid var(--card-border)}
  .view-btn{border:none;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--text-dim)}
  .view-btn.active{background:linear-gradient(135deg,var(--accent),#1a6dd4);color:#fff}
  .nav-btn{width:20px;height:20px;border-radius:3px;border:1px solid var(--card-border);background:var(--card);cursor:pointer;font-size:11px;color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-family:inherit}
  .today-btn{height:20px;padding:0 4px;border-radius:3px;border:1px solid var(--card-border);background:var(--card);cursor:pointer;font-size:7px;font-weight:700;color:var(--accent);font-family:inherit}

  .filters{display:flex;gap:2px;margin-bottom:3px;padding:0 2px}
  .filter-btn{padding:2px 6px;border-radius:10px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;border:1px solid var(--card-border);color:var(--text-dim)}
  .filter-btn.active-all{border-color:var(--accent);background:rgba(45,127,249,0.12);color:var(--accent)}

  .cal-card{background:var(--card);border-radius:6px;border:1px solid var(--card-border);overflow:hidden;width:100%}

  .month-table{width:100%;border-collapse:collapse;table-layout:fixed}
  .month-table th{padding:3px 0;text-align:center;font-size:9px;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--card-border)}
  .month-table th.sun{color:#FF6B6B}
  .month-table th.sat{color:#74B9FF}
  .month-table td{
    padding:1px;vertical-align:top;
    border-right:1px solid var(--grid-line);border-bottom:1px solid var(--grid-line);
    height:48px;cursor:pointer;overflow:hidden;
  }
  .month-table td:last-child{border-right:none}
  .month-table td:hover{background:var(--hover)}
  .month-table td.other{opacity:.2}
  .month-table td.today-cell{background:rgba(45,127,249,0.06)}

  .date-num{font-size:10px;font-weight:600;color:var(--text);margin-bottom:1px;text-align:center}
  .date-num.today{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#1a6dd4);color:#fff;font-weight:800;animation:pulse 2.5s infinite}
  .date-num.sun{color:#FF6B6B}.date-num.sat{color:#74B9FF}

  .ev-pill{border-radius:2px;padding:0 2px;margin-bottom:1px;font-size:8px;font-weight:600;border-left:2px solid;cursor:pointer;display:block;text-decoration:none;line-height:1.3;word-break:break-all;white-space:normal}
  .ev-more{font-size:7px;color:var(--text-dim);font-weight:600;text-align:center}

  .ev-bar{border-radius:2px;padding:0 2px;margin-bottom:1px;font-size:8px;font-weight:700;cursor:pointer;display:block;text-decoration:none;line-height:1.3;word-break:break-all;white-space:normal}
  .ev-bar.bar-start{border-radius:2px 0 0 2px;margin-right:-1px}
  .ev-bar.bar-mid{border-radius:0;margin-left:-1px;margin-right:-1px}
  .ev-bar.bar-end{border-radius:0 2px 2px 0;margin-left:-1px}
  .ev-bar.bar-single{border-radius:2px}

  .week-headers{width:100%;border-collapse:collapse;table-layout:fixed}
  .week-headers th{padding:3px 0;text-align:center;font-size:9px;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--card-border)}
  .week-headers th.sun{color:#FF6B6B}.week-headers th.sat{color:#74B9FF}
  .week-headers th.time-th{width:24px;color:var(--text-muted)}
  .week-dates{width:100%;border-collapse:collapse;table-layout:fixed}
  .week-dates td{padding:2px 0;text-align:center;border-bottom:1px solid var(--card-border)}
  .week-dates td.time-td{width:24px}
  .week-date-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-weight:800;font-size:10px;color:var(--text)}
  .week-date-num.today{background:linear-gradient(135deg,var(--accent),#1a6dd4);color:#fff}
  .week-scroll{overflow-y:auto;max-height:320px;position:relative}
  .week-grid{display:grid;grid-template-columns:24px 1fr;position:relative}
  .time-label{height:36px;display:flex;align-items:flex-start;justify-content:center;font-size:7px;color:var(--text-muted);font-weight:600}
  .events-area{position:relative}
  .hour-line{height:36px;border-bottom:1px solid var(--grid-line)}
  .hour-half{height:18px;border-bottom:1px dashed rgba(255,255,255,0.02)}
  .day-divider{position:absolute;top:0;bottom:0;border-left:1px solid var(--grid-line)}
  .week-block{position:absolute;border-radius:2px;padding:1px 2px;color:#fff;font-size:7px;font-weight:600;overflow:hidden;cursor:pointer;z-index:2;text-decoration:none;display:block;line-height:1.2}
  .week-block-time{font-size:6px;opacity:.8}
  .now-line{position:absolute;left:0;right:0;height:2px;z-index:10;pointer-events:none}
  .now-dot{position:absolute;top:-2px;width:6px;height:6px;border-radius:50%}

  .detail-panel{margin-top:4px;background:var(--card);border-radius:6px;padding:8px;border:1px solid var(--card-border);animation:fadeIn .2s ease}
  .detail-title{font-size:11px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:4px}
  .detail-title span{background:linear-gradient(135deg,var(--accent),#18DCFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .detail-count{background:rgba(45,127,249,0.15);color:var(--accent);padding:0 5px;border-radius:6px;font-size:8px;-webkit-text-fill-color:var(--accent)}
  .detail-item{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:5px;margin-bottom:3px;cursor:pointer;text-decoration:none;color:inherit}
  .detail-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
  .detail-info{flex:1;min-width:0}
  .detail-name{font-weight:700;font-size:10px}
  .detail-meta{font-size:8px;color:var(--text-dim);margin-top:1px}
  .detail-arrow{color:var(--text-muted);font-size:10px;flex-shrink:0}

  .setup-overlay{display:flex;align-items:center;justify-content:center;min-height:80vh}
  .setup-box{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 12px;width:100%;max-width:360px}
  .setup-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#18DCFF);display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 8px}
  .setup-title{text-align:center;font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--accent),#18DCFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
  .setup-desc{text-align:center;font-size:10px;color:var(--text-dim);margin-bottom:14px;line-height:1.5}
  .setup-label{font-size:9px;font-weight:700;color:var(--text-dim);margin-bottom:3px}
  .setup-input{width:100%;padding:7px 8px;border-radius:6px;border:1px solid var(--card-border);background:var(--surface);color:var(--text);font-size:10px;font-family:inherit;outline:none;margin-bottom:8px}
  .setup-input:focus{border-color:var(--accent)}
  .setup-btn{width:100%;padding:9px;border:none;border-radius:6px;background:linear-gradient(135deg,var(--accent),#1a6dd4);color:#fff;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit}
  .setup-hint{margin-top:8px;padding:7px;border-radius:6px;background:var(--surface);border:1px solid var(--card-border);font-size:8px;color:var(--text-dim);line-height:1.6}
  .setup-hint code{background:rgba(45,127,249,0.15);color:var(--accent);padding:0 3px;border-radius:2px;font-size:8px}
  .setup-step{display:flex;align-items:flex-start;gap:4px;margin-bottom:4px}
  .setup-step-num{width:14px;height:14px;border-radius:50%;flex-shrink:0;background:var(--accent);color:#fff;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center}

  .loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 8px;color:var(--text-dim)}
  .spinner{width:20px;height:20px;border:2px solid var(--card-border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:6px}
  .error-msg{padding:8px;background:rgba(255,107,107,0.08);color:#FF6B6B;border:1px solid rgba(255,107,107,0.2);border-radius:6px;font-size:10px;text-align:center;margin:8px 2px}

  @media(min-width:641px){
    body{padding:16px}
    .app{max-width:960px;margin:0 auto}
    .header{margin-bottom:10px;padding:0}
    .logo{width:32px;height:32px;font-size:15px;border-radius:7px}
    .header-title{font-size:18px}
    .header-sub{font-size:10px}
    .view-btn{padding:4px 10px;font-size:11px;border-radius:5px}
    .view-toggle{border-radius:7px;padding:2px}
    .nav-btn{width:28px;height:28px;font-size:14px;border-radius:5px}
    .today-btn{height:28px;padding:0 8px;font-size:9px;border-radius:5px}
    .filters{gap:4px;margin-bottom:8px;padding:0}
    .filter-btn{padding:3px 10px;font-size:10px;border-radius:14px}
    .cal-card{border-radius:10px}
    .month-table th{font-size:11px;padding:6px 0}
    .month-table td{height:80px;padding:3px}
    .date-num{font-size:12px}
    .ev-pill{font-size:10px;padding:1px 4px;border-left-width:3px;border-radius:3px}
    .ev-bar{font-size:10px;padding:1px 4px;border-radius:3px}
    .ev-more{font-size:9px}
    .detail-panel{padding:12px;margin-top:8px;border-radius:8px}
    .detail-name{font-size:12px}
    .detail-meta{font-size:9px}
    .detail-icon{width:28px;height:28px;font-size:13px}
    .week-headers th{font-size:11px}
    .week-headers th.time-th{width:40px}
    .week-dates td.time-td{width:40px}
    .week-date-num{width:28px;height:28px;font-size:13px}
    .week-grid{grid-template-columns:40px 1fr}
    .week-scroll{max-height:440px}
    .time-label{height:44px;font-size:9px}
    .hour-line{height:44px}
    .hour-half{height:22px}
    .week-block{font-size:9px;padding:2px 4px;border-radius:4px}
    .week-block-time{font-size:7px}
  }

  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CONFIG={
  WORKER_URL:'https://lingering-art-15ef-notion-proxy.abyss9405.workers.dev',
  DATABASE_ID:'1ff6b59b151a8173b350ea75f155aa8d',
  PROPS:{title:'제목',date:'날짜',category:'카테고리',duration:'소요시간'},
  CATEGORIES:[{id:'업무',emoji:'💼',color:'neon'},{id:'개인',emoji:'🌟',color:'cyan'}],
};
const COLORS={
  electric:{bg:'#2D7FF9',light:'rgba(45,127,249,0.12)',text:'#2D7FF9'},
  cyan:{bg:'#18DCFF',light:'rgba(24,220,255,0.10)',text:'#18DCFF'},
  indigo:{bg:'#6C5CE7',light:'rgba(108,92,231,0.12)',text:'#A29BFE'},
  ice:{bg:'#74B9FF',light:'rgba(116,185,255,0.10)',text:'#74B9FF'},
  neon:{bg:'#00D2D3',light:'rgba(0,210,211,0.10)',text:'#00D2D3'},
  steel:{bg:'#576574',light:'rgba(87,101,116,0.12)',text:'#8395A7'},
  mint:{bg:'#55EFC4',light:'rgba(85,239,196,0.08)',text:'#55EFC4'},
};
const DAYS=['월','화','수','목','금','토','일'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const HOURS=Array.from({length:16},(_,i)=>i+6);

let state={view:'month',currentDate:new Date(),events:[],selectedDate:null,filterCat:null,loading:false,error:null,configured:!!(CONFIG.WORKER_URL&&CONFIG.DATABASE_ID)};

async function fetchEvents(start,end){
  state.loading=true;state.error=null;render();
  try{
    const res=await fetch(CONFIG.WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({database_id:CONFIG.DATABASE_ID,filter:{and:[{property:CONFIG.PROPS.date,date:{on_or_after:start}},{property:CONFIG.PROPS.date,date:{on_or_before:end}}]},sorts:[{property:CONFIG.PROPS.date,direction:'ascending'}],page_size:100})});
    if(!res.ok)throw new Error(`API 오류 (${res.status})`);
    const data=await res.json();
    state.events=(data.results||[]).map(p=>{
      const pr=p.properties,dateObj=pr[CONFIG.PROPS.date]?.date;
      const startVal=dateObj?.start||'',endVal=dateObj?.end||'';
      const[d,t]=startVal.includes('T')?startVal.split('T'):[startVal,''];
      const endDate=endVal?endVal.split('T')[0]:'';
      return{id:p.id,url:p.url||`https://notion.so/${p.id.replace(/-/g,'')}`,title:pr[CONFIG.PROPS.title]?.title?.[0]?.plain_text||'(제목 없음)',date:d,endDate,time:t?t.slice(0,5):'',category:pr[CONFIG.PROPS.category]?.select?.name||'',duration:pr[CONFIG.PROPS.duration]?.number||30,isMultiDay:!!(endDate&&endDate!==d)};
    });
    state.loading=false;render();
  }catch(e){state.loading=false;state.error=e.message;render();}
}

function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return fmt(new Date())}
function getMonthDays(y,m){
  const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  let fd=new Date(y,m,1).getDay();fd=fd===0?6:fd-1;
  const days=[];
  for(let i=fd-1;i>=0;i--)days.push({date:new Date(y,m-1,prev-i),cur:false});
  for(let i=1;i<=dim;i++)days.push({date:new Date(y,m,i),cur:true});
  while(days.length<42){const n=days.length-fd-dim+1;days.push({date:new Date(y,m+1,n),cur:false})}
  return days;
}
function getWeekDays(d){
  const s=new Date(d);let day=s.getDay();
  s.setDate(s.getDate()+(day===0?-6:1-day));
  return Array.from({length:7},(_,i)=>{const w=new Date(s);w.setDate(s.getDate()+i);return w});
}
function getDowMon(d){const dow=d.getDay();return dow===0?6:dow-1;}
function eventsOn(ds){
  let evs=state.events.filter(e=>e.isMultiDay?(ds>=e.date&&ds<=e.endDate):e.date===ds);
  if(state.filterCat){
    if(state.filterCat==='업무')evs=evs.filter(e=>e.category!=='개인');
    else if(state.filterCat==='개인')evs=evs.filter(e=>e.category==='개인'||e.category==='공휴일');
  }
  return evs;
}
function catInfo(n){return CONFIG.CATEGORIES.find(c=>c.id===n)||{emoji:'📌',color:'steel'}}
function catColor(n){
  const c=CONFIG.CATEGORIES.find(cat=>cat.id===n);
  if(c)return COLORS[c.color]||COLORS.steel;
  if(n==='공휴일')return COLORS['electric'];
  return COLORS['neon'];
}
function fetchRange(){const d=state.currentDate;if(state.view==='month'){const y=d.getFullYear(),m=d.getMonth();fetchEvents(fmt(new Date(y,m-1,20)),fmt(new Date(y,m+1,10)))}else{const wk=getWeekDays(d);fetchEvents(fmt(wk[0]),fmt(wk[6]))}}

function render(){
  const app=document.getElementById('app');
  if(!state.configured){app.innerHTML=renderSetup();bindSetup();return}
  app.innerHTML=renderHeader()+renderFilters()+renderCalendar()+renderDetail();
  bindEvents();
}

function renderSetup(){
  return`<div class="setup-overlay"><div class="setup-box">
    <div class="setup-logo">📅</div>
    <div class="setup-title">Notion Calendar</div>
    <div class="setup-desc">노션 DB와 연결하여 일정을 확인하세요</div>
    <div class="setup-label">🔗 Worker URL</div>
    <input class="setup-input" id="inp-worker" value="${CONFIG.WORKER_URL}">
    <div class="setup-label">🗄️ Database ID</div>
    <input class="setup-input" id="inp-dbid" value="${CONFIG.DATABASE_ID}">
    <button class="setup-btn" id="btn-connect">🚀 연결</button>
    <div class="setup-hint">
      <div style="font-weight:700;margin-bottom:3px;color:var(--text)">📋 처음이라면?</div>
      <div class="setup-step"><div class="setup-step-num">1</div><div>노션 DB에 <code>제목</code> <code>날짜</code> <code>카테고리</code> 속성</div></div>
      <div class="setup-step"><div class="setup-step-num">2</div><div><a href="https://www.notion.so/my-integrations" target="_blank" style="color:var(--accent)">notion.so/my-integrations</a> API 키</div></div>
      <div class="setup-step"><div class="setup-step-num">3</div><div>Cloudflare Worker + <code>worker.js</code></div></div>
      <div class="setup-step"><div class="setup-step-num">4</div><div>위에 입력 후 연결!</div></div>
    </div>
  </div></div>`}
function bindSetup(){const b=document.getElementById('btn-connect'),w=document.getElementById('inp-worker'),d=document.getElementById('inp-dbid');if(!b)return;b.addEventListener('click',()=>{CONFIG.WORKER_URL=w.value.trim();CONFIG.DATABASE_ID=d.value.trim();if(CONFIG.WORKER_URL&&CONFIG.DATABASE_ID){state.configured=true;render();fetchRange()}})}

function renderHeader(){
  const d=state.currentDate;let title;
  if(state.view==='month')title=`${d.getFullYear()}년 ${MONTHS[d.getMonth()]}`;
  else{const wk=getWeekDays(d),s=wk[0],e=wk[6];title=s.getMonth()===e.getMonth()?`${MONTHS[s.getMonth()]} ${s.getDate()}–${e.getDate()}일`:`${MONTHS[s.getMonth()]} ${s.getDate()}–${MONTHS[e.getMonth()]} ${e.getDate()}일`}
  const cm=state.events.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===d.getMonth()&&ed.getFullYear()===d.getFullYear()}).length;
  return`<div class="header"><div class="header-left"><div class="logo">📅</div><div><div class="header-title">${title}</div><div class="header-sub">${cm}개 · 전체 ${state.events.length}개</div></div></div><div class="header-right"><div class="view-toggle"><button class="view-btn ${state.view==='month'?'active':''}" data-view="month">월</button><button class="view-btn ${state.view==='week'?'active':''}" data-view="week">주</button></div><button class="nav-btn" data-nav="-1">‹</button><button class="today-btn" data-nav="today">오늘</button><button class="nav-btn" data-nav="1">›</button></div></div>`}

function renderFilters(){
  let h=`<div class="filters"><button class="filter-btn ${!state.filterCat?'active-all':''}" data-cat="">전체</button>`;
  for(const cat of CONFIG.CATEGORIES){const c=COLORS[cat.color],a=state.filterCat===cat.id;h+=`<button class="filter-btn" data-cat="${cat.id}" style="${a?`border-color:${c.bg}66;background:${c.light};color:${c.text}`:''}">${cat.emoji}${cat.id}</button>`}
  return h+`</div>`}

function renderCalendar(){
  if(state.loading)return`<div class="cal-card"><div class="loading-overlay"><div class="spinner"></div><div style="font-size:10px">불러오는 중...</div></div></div>`;
  if(state.error)return`<div class="error-msg">⚠️ ${state.error}</div>`;
  return state.view==='month'?renderMonth():renderWeek()}

function renderMonth(){
  const d=state.currentDate,days=getMonthDays(d.getFullYear(),d.getMonth()),td=todayStr();
  let h=`<div class="cal-card"><table class="month-table"><thead><tr>`;
  for(let i=0;i<7;i++){const cls=i===6?'sun':i===5?'sat':'';h+=`<th class="${cls}">${DAYS[i]}</th>`}
  h+=`</tr></thead><tbody>`;
  for(let r=0;r<6;r++){
    h+=`<tr>`;
    for(let c=0;c<7;c++){
      const idx=r*7+c,day=days[idx];
      const ds=fmt(day.date),isToday=ds===td,dow=getDowMon(day.date);
      const isSun=dow===6,isSat=dow===5;
      const evs=eventsOn(ds);
      h+=`<td class="${day.cur?'':'other'} ${isToday?'today-cell':''}" data-date="${ds}">`;
      if(isToday)h+=`<div style="text-align:center"><span class="date-num today">${day.date.getDate()}</span></div>`;
      else h+=`<div class="date-num ${isSun?'sun':''} ${isSat?'sat':''}">${day.date.getDate()}</div>`;
      const multiEvs=evs.filter(e=>e.isMultiDay),singleEvs=evs.filter(e=>!e.isMultiDay);
      let shown=0;const maxShow=2;
      for(const ev of multiEvs){
        if(shown>=maxShow)break;
        const col=catColor(ev.category),isStart=ds===ev.date,isEnd=ds===ev.endDate;
        let barCls='bar-mid';
        if(isStart&&isEnd)barCls='bar-single';else if(isStart)barCls='bar-start';else if(isEnd)barCls='bar-end';
        const label=isStart?ev.title:(dow===0?ev.title:'');
        h+=`<a class="ev-bar ${barCls}" href="${ev.url}" target="_blank" style="background:${col.bg}88;color:#fff" title="${ev.title}">${label||'&nbsp;'}</a>`;
        shown++;
      }
      for(const ev of singleEvs){
        if(shown>=maxShow)break;
        const col=catColor(ev.category);
        h+=`<a class="ev-pill" href="${ev.url}" target="_blank" style="background:${col.light};border-left-color:${col.bg};color:${col.text}" title="${ev.title}">${ev.title}</a>`;
        shown++;
      }
      if(multiEvs.length+singleEvs.length>maxShow)h+=`<div class="ev-more">+${multiEvs.length+singleEvs.length-maxShow}</div>`;
      h+=`</td>`;
    }
    h+=`</tr>`;
  }
  return h+`</tbody></table></div>`}

function renderWeek(){
  const wk=getWeekDays(state.currentDate),td=todayStr(),hh=36;
  let h=`<div class="cal-card"><table class="week-headers"><tr><th class="time-th">⏰</th>`;
  for(let i=0;i<7;i++){const cls=i===6?'sun':i===5?'sat':'';h+=`<th class="${cls}">${DAYS[i]}</th>`}
  h+=`</tr></table><table class="week-dates"><tr><td class="time-td"></td>`;
  for(const wd of wk){const ds=fmt(wd),isToday=ds===td;h+=`<td><span class="week-date-num ${isToday?'today':''}">${wd.getDate()}</span></td>`}
  h+=`</tr></table><div class="week-scroll"><div class="week-grid"><div>`;
  for(const hr of HOURS)h+=`<div class="time-label">${String(hr).padStart(2,'0')}</div>`;
  h+=`</div><div class="events-area">`;
  for(const hr of HOURS)h+=`<div class="hour-line"><div class="hour-half"></div></div>`;
  for(let i=1;i<7;i++)h+=`<div class="day-divider" style="left:${i*(100/7)}%"></div>`;
  for(let di=0;di<7;di++){const ds=fmt(wk[di]),evs=eventsOn(ds);for(const ev of evs){
    if(!ev.time)continue;
    const[ehh,emm]=ev.time.split(':').map(Number);
    const top=((ehh-6)*60+emm)*(hh/60),height=Math.max((ev.duration||30)*(hh/60),14);const col=catColor(ev.category);
    h+=`<a class="week-block" href="${ev.url}" target="_blank" style="top:${top}px;left:calc(${di*(100/7)}% + 1px);width:calc(${100/7}% - 2px);height:${height}px;background:linear-gradient(135deg,${col.bg}cc,${col.bg}66)"><div class="week-block-time">${ev.time}</div><div>${ev.title}</div></a>`}}
  const now=new Date(),tidx=wk.findIndex(w=>fmt(w)===td);
  if(tidx>=0&&now.getHours()>=6&&now.getHours()<22){const top=((now.getHours()-6)*60+now.getMinutes())*(hh/60);h+=`<div class="now-line" style="top:${top}px;background:var(--accent)"><div class="now-dot" style="left:calc(${tidx*(100/7)}%);background:var(--accent)"></div></div>`}
  return h+`</div></div></div></div>`}

function renderDetail(){
  if(!state.selectedDate)return'';const evs=eventsOn(state.selectedDate);if(!evs.length)return'';
  const[y,m,dd]=state.selectedDate.split('-').map(Number);
  let h=`<div class="detail-panel"><div class="detail-title"><span>${m}/${dd}</span><div class="detail-count">${evs.length}개</div></div>`;
  for(const ev of evs){const col=catColor(ev.category),ci=catInfo(ev.category);
    const info=ev.isMultiDay?`${ev.date}~${ev.endDate}`:(ev.time||'종일');
    h+=`<a class="detail-item" href="${ev.url}" target="_blank" style="background:${col.light};border:1px solid ${col.bg}22"><div class="detail-icon" style="background:linear-gradient(135deg,${col.bg}cc,${col.bg}66)">${ci.emoji}</div><div class="detail-info"><div class="detail-name" style="color:${col.text}">${ev.title}</div><div class="detail-meta">${info} · ${ev.category||'기타'}</div></div><div class="detail-arrow">→</div></a>`}
  return h+`</div>`}

function bindEvents(){
  document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{state.view=b.dataset.view;state.selectedDate=null;render();fetchRange()}));
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{const v=b.dataset.nav;if(v==='today')state.currentDate=new Date();else{const dir=parseInt(v),d=new Date(state.currentDate);if(state.view==='month')d.setMonth(d.getMonth()+dir);else d.setDate(d.getDate()+dir*7);state.currentDate=d}state.selectedDate=null;render();fetchRange()}));
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{const c=b.dataset.cat;state.filterCat=c===state.filterCat||c===''?null:c;state.selectedDate=null;render()}));
  document.querySelectorAll('td[data-date]').forEach(td=>td.addEventListener('click',(e)=>{if(e.target.closest('.ev-pill')||e.target.closest('.ev-bar'))return;const ds=td.dataset.date;state.selectedDate=state.selectedDate===ds?null:ds;render()}))}

render();
if(state.configured)fetchRange();
</script>
</body>
</html>
